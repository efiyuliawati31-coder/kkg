<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi KKG Pembelajaran - AI Co-Teacher</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons (Web component / CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col justify-between">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-violet-700 via-indigo-700 to-blue-700 text-white shadow-md">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-white/10 p-2 rounded-xl backdrop-blur-sm">
          <i data-lucide="brain" class="w-8 h-8 text-indigo-200 animate-pulse"></i>
        </div>
        <div>
          <h1 class="font-bold text-lg md:text-xl leading-tight">Materi KKG Pembelajaran</h1>
          <p class="text-xs text-indigo-100 flex items-center gap-1">
            <i data-lucide="sparkles" class="w-3.5 h-3.5 text-amber-300"></i> Etika & Implementasi AI Co-Teacher
          </p>
        </div>
      </div>
      <div id="user-badge" class="hidden bg-white/10 px-3 py-1.5 rounded-lg text-xs font-semibold backdrop-blur-sm flex items-center gap-2">
        <i data-lucide="user" class="w-3.5 h-3.5 text-indigo-200"></i>
        <span id="badge-name" class="max-w-[120px] truncate">Peserta</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="max-w-4xl w-full mx-auto px-4 py-8 flex-grow flex flex-col justify-center">
    <div id="app">
      <!-- Loading State di Awal -->
      <div class="text-center py-12 flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-indigo-600 mb-4"></i>
        <p class="text-slate-500 font-medium animate-pulse">Menghubungkan ke server pelatihan KKG...</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-100 border-t border-slate-200 py-6 text-center text-xs text-slate-400">
    <div class="max-w-4xl mx-auto px-4">
      <p>© 2026 Pelatihan Mandiri KKG Indonesia. Dibuat khusus untuk Pembelajaran Bermakna Berbantuan AI.</p>
      <p class="mt-1 opacity-80">Platform mendukung real-time data sync untuk seluruh peserta pelatihan.</p>
    </div>
  </footer>

  <!-- Firebase & App Logic -->
  <script type="module">
    // Import SDK Firebase dari CDN resmi
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // === PETUNJUK HOSTING MANDIRI ===
    // Ganti konfigurasi Firebase di bawah ini jika Anda ingin menyimpannya di Project Firebase privat Anda.
    const myFirebaseConfig = {
      apiKey: "API_KEY_ANDA",
      authDomain: "PROJECT_ID_ANDA.firebaseapp.com",
      projectId: "PROJECT_ID_ANDA",
      storageBucket: "PROJECT_ID_ANDA.appspot.com",
      messagingSenderId: "SENDER_ID_ANDA",
      appId: "APP_ID_ANDA"
    };

    // Deteksi otomatis apakah konfigurasi bawaan lingkungan Canvas tersedia
    let firebaseConfig;
    try {
      firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
    } catch (e) {
      firebaseConfig = myFirebaseConfig;
    }

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'kkg-ai-learning-app';

    // === DATA SKENARIO ===
    const QUESTIONS = [
      {
        id: 1,
        question: "Menggunakan AI untuk mencari ide ice breaking agar materi lebih seru.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 0,
        explanation: "Sangat baik! AI adalah asisten luar biasa untuk bertukar pikiran (brainstorming) aktivitas kreatif seperti ice breaking guna mencairkan suasana belajar di kelas."
      },
      {
        id: 2,
        question: "Menyalin jawaban AI langsung untuk kunci jawaban tanpa diperiksa.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 1,
        explanation: "Harus dihindari! AI bisa mengalami halusinasi atau memberikan jawaban yang tidak sesuai konteks kurikulum lokal. Guru wajib selalu memverifikasi ulang setiap konten sebelum diserahkan ke siswa."
      },
      {
        id: 3,
        question: "Meminta AI menyusun draf RPP atau soal ujian untuk hemat waktu.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 0,
        explanation: "Boleh dilakukan! Ini adalah pemanfaatan AI yang sangat efisien sebagai 'co-pilot' administrasi guru. Pastikan untuk meninjau dan menyesuaikannya dengan karakteristik siswa Anda."
      },
      {
        id: 4,
        question: "Menggunakan AI untuk memberikan bimbingan moral/empati kepada murid.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 1,
        explanation: "Harus dihindari! Sentuhan batin, empati emosional, bimbingan akhlak, dan pembentukan karakter adalah esensi kemanusiaan yang hanya bisa diberikan oleh sosok guru nyata, bukan mesin."
      },
      {
        id: 5,
        question: "Meminta AI menyederhanakan teks materi yang sulit untuk murid.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 0,
        explanation: "Boleh dilakukan! AI sangat handal dalam melakukan parafrase, menyederhanakan penjelasan kompleks, atau membuat analogi yang lebih ramah anak sesuai tingkat usia kelas."
      },
      {
        id: 6,
        question: "Memasukkan nilai raport asli murid ke platform AI publik.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 1,
        explanation: "Harus dihindari! Memasukkan data nilai asli, nama lengkap, atau informasi sensitif siswa ke platform AI publik berisiko melanggar undang-undang perlindungan data pribadi murid."
      },
      {
        id: 7,
        question: "Menggunakan AI untuk mengubah materi sejarah menjadi lirik lagu rap agar mudah diingat.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 0,
        explanation: "Sangat boleh! Ini metode kreatif memanfaatkan AI generatif untuk merancang media pembelajaran berbasis seni (musik) yang seru, adaptif, dan mudah diingat siswa."
      },
      {
        id: 8,
        question: "Membiarkan AI mengajar di kelas sementara guru hanya menonton.",
        options: ["Boleh Dilakukan", "Harus Dihindari"],
        correctAnswer: 1,
        explanation: "Harus dihindari! AI hadir untuk membantu guru (co-teacher), bukan menggantikan kehadiran fisik dan psikologis guru yang aktif mendampingi, mengamati, serta membimbing siswa secara langsung."
      }
    ];

    // === APPLICATION STATE ===
    let state = {
      user: null,
      screen: 'register',
      name: '',
      school: '',
      city: '',
      regError: '',
      currentIdx: 0,
      selectedAnswers: {},
      quizStartTime: null,
      timeTaken: 0,
      finalScore: 0,
      leaderboard: [],
      savingScore: false,
      scoreSaved: false,
      showIntegrations: false,
      copiedText: false,
      sheetsWebhookUrl: localStorage.getItem('kkg_sheets_webhook') || '',
      sheetsStatus: ''
    };

    // === RENDER ENGINE ===
    function render() {
      const appEl = document.getElementById('app');
      const userBadgeEl = document.getElementById('user-badge');
      const badgeNameEl = document.getElementById('badge-name');

      // Update Header Badge
      if (state.screen !== 'register' && state.name) {
        userBadgeEl.classList.remove('hidden');
        badgeNameEl.textContent = state.name;
      } else {
        userBadgeEl.classList.add('hidden');
      }

      // Render screen
      if (state.screen === 'register') {
        appEl.innerHTML = `
          <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 transition-all duration-300 transform animate-fadeIn">
            <div class="text-center mb-8">
              <div class="inline-block bg-indigo-50 p-4 rounded-full mb-4">
                <i data-lucide="book-open" class="w-10 h-10 text-indigo-600"></i>
              </div>
              <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Selamat Datang Rekan Pendidik!</h2>
              <p class="text-slate-500 mt-2 text-sm md:text-base max-w-lg mx-auto">
                Silakan isi identitas Anda terlebih dahulu untuk memulai studi kasus peran strategis guru sebagai AI Co-Teacher.
              </p>
            </div>

            <form id="register-form" class="max-w-md mx-auto space-y-5">
              <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 flex items-center gap-1.5">
                  <i data-lucide="user" class="w-4 h-4 text-indigo-500"></i> Nama Lengkap Pendidik
                </label>
                <input 
                  type="text" 
                  id="input-name"
                  value="${state.name}"
                  placeholder="Contoh: Ibu Rina Herawati, S.Pd."
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                  required
                />
              </div>

              <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 flex items-center gap-1.5">
                  <i data-lucide="school" class="w-4 h-4 text-indigo-500"></i> Asal Sekolah / Instansi
                </label>
                <input 
                  type="text" 
                  id="input-school"
                  value="${state.school}"
                  placeholder="Contoh: SMP Negeri 2 Kota"
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                  required
                />
              </div>

              <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 flex items-center gap-1.5">
                  <i data-lucide="file-text" class="w-4 h-4 text-indigo-500"></i> Kabupaten / Kota
                </label>
                <input 
                  type="text" 
                  id="input-city"
                  value="${state.city}"
                  placeholder="Contoh: Bandung"
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                  required
                />
              </div>

              ${state.regError ? `
                <div class="p-3 bg-red-50 text-red-600 text-sm rounded-lg flex items-center gap-2">
                  <i data-lucide="x-circle" class="w-4 h-4 flex-shrink-0"></i>
                  <span>${state.regError}</span>
                </div>
              ` : ''}

              <button 
                type="submit"
                class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2 mt-4"
              >
                Masuk Ruang Latihan <i data-lucide="chevron-right" class="w-5 h-5"></i>
              </button>
            </form>
          </div>
        `;

        document.getElementById('register-form').addEventListener('submit', (e) => {
          e.preventDefault();
          const inName = document.getElementById('input-name').value.trim();
          const inSchool = document.getElementById('input-school').value.trim();
          const inCity = document.getElementById('input-city').value.trim();

          if (!inName || !inSchool || !inCity) {
            state.regError = "Seluruh isian identitas wajib dilengkapi!";
            render();
            return;
          }

          state.name = inName;
          state.school = inSchool;
          state.city = inCity;
          state.regError = '';
          state.screen = 'prep';
          render();
        });

      } else if (state.screen === 'prep') {
        appEl.innerHTML = `
          <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 max-w-2xl mx-auto transition-all duration-300 animate-fadeIn">
            <div class="text-center mb-6">
              <div class="inline-block bg-indigo-50 p-4 rounded-full mb-3">
                <i data-lucide="brain" class="w-10 h-10 text-indigo-600"></i>
              </div>
              <h2 class="text-2xl font-black text-slate-800">Peran Anda: AI Co-Teacher</h2>
              <p class="text-sm text-slate-500 mt-1">Panduan Penggunaan Teknologi AI Secara Bijaksana</p>
            </div>

            <div class="bg-amber-50/70 border border-amber-100 rounded-2xl p-6 mb-6">
              <p class="text-slate-700 font-medium leading-relaxed text-center text-sm md:text-base">
                "Sebagai <strong class="text-indigo-700">AI Co-Teacher</strong>, Anda akan dihadapkan pada beberapa skenario nyata penggunaan AI di sekolah. Tentukan apakah tindakan tersebut <strong class="text-emerald-700">Boleh Dilakukan</strong> atau <strong className="text-rose-700">Harus Dihindari</strong>."
              </p>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 space-y-2 text-xs text-slate-500">
              <p class="font-bold uppercase text-slate-400">Poin Penilaian:</p>
              <ul class="list-disc list-inside space-y-1">
                <li>Skor maksimal: 100 poin (8 skenario kasus).</li>
                <li>Kecepatan pengerjaan dihitung untuk membedakan urutan juara pada nilai yang sama.</li>
              </ul>
            </div>

            <div class="flex gap-4 mt-8">
              <button 
                id="btn-back-reg"
                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition text-sm text-center"
              >
                Kembali
              </button>
              <button 
                id="btn-start-quiz"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-sm text-center"
              >
                Mulai Simulasi
              </button>
            </div>
          </div>
        `;

        document.getElementById('btn-back-reg').addEventListener('click', () => {
          state.screen = 'register';
          render();
        });

        document.getElementById('btn-start-quiz').addEventListener('click', () => {
          state.quizStartTime = Date.now();
          state.currentIdx = 0;
          state.selectedAnswers = {};
          state.scoreSaved = false;
          state.screen = 'quiz';
          render();
        });

      } else if (state.screen === 'quiz') {
        const q = QUESTIONS[state.currentIdx];
        const isSelectedBoleh = state.selectedAnswers[state.currentIdx] === 0;
        const isSelectedHindari = state.selectedAnswers[state.currentIdx] === 1;

        appEl.innerHTML = `
          <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 transition-all duration-300">
            
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
              <div>
                <span class="bg-indigo-50 text-indigo-700 text-xs font-black uppercase tracking-wider px-2.5 py-1 rounded-full">
                  Skenario ${state.currentIdx + 1} dari ${QUESTIONS.length}
                </span>
              </div>
              <div class="text-slate-500 text-sm flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">
                <i data-lucide="clock" class="w-4 h-4 text-indigo-500 animate-spin" style="animation-duration: 3s;"></i>
                <span class="font-mono font-bold text-slate-700">Sedang Berjalan...</span>
              </div>
            </div>

            <div class="w-full bg-slate-100 h-2 rounded-full mb-8 overflow-hidden">
              <div 
                class="bg-gradient-to-r from-indigo-500 to-blue-500 h-full transition-all duration-300"
                style="width: ${((state.currentIdx + 1) / QUESTIONS.length) * 100}%"
              ></div>
            </div>

            <div class="mb-10 text-center py-4 bg-slate-50/50 rounded-2xl px-4 border border-slate-100">
              <span class="text-xs uppercase tracking-wider text-slate-400 font-bold block mb-2">Kasus / Tindakan:</span>
              <h3 class="text-lg md:text-xl font-bold text-slate-800 leading-relaxed max-w-2xl mx-auto">
                "${q.question}"
              </h3>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              
              <button
                id="opt-boleh"
                class="p-6 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-3 text-center ${
                  isSelectedBoleh 
                    ? 'border-emerald-600 bg-emerald-50/80 ring-4 ring-emerald-500/10' 
                    : 'border-slate-200 hover:border-emerald-200 hover:bg-slate-50'
                }"
              >
                <div class="p-3 rounded-full ${isSelectedBoleh ? 'bg-emerald-600 text-white' : 'bg-emerald-50 text-emerald-600'}">
                  <i data-lucide="thumbs-up" class="w-6 h-6"></i>
                </div>
                <div>
                  <span class="block font-black text-emerald-800 text-base">Boleh Dilakukan</span>
                  <span class="text-xs text-slate-400 mt-0.5 block">Sesuai etika AI Co-Teacher</span>
                </div>
              </button>

              <button
                id="opt-hindari"
                class="p-6 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-3 text-center ${
                  isSelectedHindari 
                    ? 'border-rose-600 bg-rose-50/80 ring-4 ring-rose-500/10' 
                    : 'border-slate-200 hover:border-rose-200 hover:bg-slate-50'
                }"
              >
                <div class="p-3 rounded-full ${isSelectedHindari ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-600'}">
                  <i data-lucide="thumbs-down" class="w-6 h-6"></i>
                </div>
                <div>
                  <span class="block font-black text-rose-800 text-base">Harus Dihindari</span>
                  <span class="text-xs text-slate-400 mt-0.5 block">Melanggar atau berisiko etis</span>
                </div>
              </button>

            </div>

            <div class="flex justify-between items-center mt-12 border-t border-slate-100 pt-6">
              <button
                id="btn-prev-question"
                ${state.currentIdx === 0 ? 'disabled' : ''}
                class="px-5 py-2.5 rounded-xl font-bold text-sm transition ${
                  state.currentIdx === 0 
                    ? 'text-slate-300 cursor-not-allowed' 
                    : 'text-slate-600 hover:bg-slate-100'
                }"
              >
                Sebelumnya
              </button>
              
              <button
                id="btn-next-question"
                ${state.selectedAnswers[state.currentIdx] === undefined ? 'disabled' : ''}
                class="px-6 py-2.5 rounded-xl font-bold text-sm transition-all flex items-center gap-1.5 ${
                  state.selectedAnswers[state.currentIdx] === undefined
                    ? 'bg-slate-100 text-slate-400 cursor-not-allowed'
                    : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md'
                }"
              >
                <span>${state.currentIdx === QUESTIONS.length - 1 ? 'Selesai & Evaluasi' : 'Berikutnya'}</span>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        `;

        document.getElementById('opt-boleh').addEventListener('click', () => {
          state.selectedAnswers[state.currentIdx] = 0;
          render();
        });

        document.getElementById('opt-hindari').addEventListener('click', () => {
          state.selectedAnswers[state.currentIdx] = 1;
          render();
        });

        document.getElementById('btn-prev-question').addEventListener('click', () => {
          if (state.currentIdx > 0) {
            state.currentIdx--;
            render();
          }
        });

        document.getElementById('btn-next-question').addEventListener('click', () => {
          if (state.selectedAnswers[state.currentIdx] !== undefined) {
            if (state.currentIdx < QUESTIONS.length - 1) {
              state.currentIdx++;
              render();
            } else {
              // Finish Quiz
              const endTime = Date.now();
              state.timeTaken = Math.round((endTime - state.quizStartTime) / 1000);

              let correctCount = 0;
              QUESTIONS.forEach((q, idx) => {
                if (state.selectedAnswers[idx] === q.correctAnswer) {
                  correctCount++;
                }
              });

              state.finalScore = Math.round((correctCount / QUESTIONS.length) * 100);
              state.screen = 'score';
              render();
            }
          }
        });

      } else if (state.screen === 'score') {
        let correctCount = 0;
        QUESTIONS.forEach((q, idx) => {
          if (state.selectedAnswers[idx] === q.correctAnswer) {
            correctCount++;
          }
        });

        appEl.innerHTML = `
          <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 transition-all duration-300 animate-fadeIn">
            <div class="text-center mb-8">
              <div class="inline-block bg-indigo-50 p-4 rounded-full mb-3">
                <i data-lucide="trophy" class="w-12 h-12 text-indigo-600"></i>
              </div>
              <h2 class="text-2xl md:text-3xl font-black text-slate-800">Evaluasi Selesai!</h2>
              <p class="text-slate-500 text-sm mt-1">Laporan kesiapan etika pemanfaatan AI oleh Guru KKG</p>
            </div>

            <!-- Kartu Skor -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
              <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 text-white rounded-2xl p-6 text-center shadow-lg shadow-indigo-100 flex flex-col justify-center">
                <p class="text-xs uppercase tracking-wider font-semibold opacity-80">Skor Anda</p>
                <p class="text-5xl font-black my-2">${state.finalScore}</p>
                <p class="text-xs text-indigo-100">Maksimal 100 Poin</p>
              </div>
              <div class="bg-slate-50 border border-slate-100 rounded-2xl p-6 text-center flex flex-col justify-center">
                <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">Keputusan Tepat</p>
                <p class="text-3xl font-extrabold text-slate-700 my-2">${correctCount} / ${QUESTIONS.length}</p>
                <p class="text-xs text-slate-500">Skenario Berhasil Terjawab</p>
              </div>
              <div class="bg-slate-50 border border-slate-100 rounded-2xl p-6 text-center flex flex-col justify-center">
                <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">Durasi Pengerjaan</p>
                <p class="text-3xl font-extrabold text-slate-700 my-2">${formatDuration(state.timeTaken)}</p>
                <p class="text-xs text-slate-500">Makin cepat makin berpotensi unggul</p>
              </div>
            </div>

            <!-- Aksi Berbagi / Simpan -->
            <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 mb-8 text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-4">
              <div class="flex-1">
                <h4 class="font-bold text-indigo-900 text-base">Amankan Posisi di Papan Peringkat?</h4>
                <p class="text-xs text-indigo-700 mt-0.5">Simpan skor Anda agar muncul di papan skor bersama guru-guru hebat KKG lainnya.</p>
              </div>
              <div class="flex gap-2 w-full md:w-auto">
                <button
                  id="btn-save-score"
                  ${state.savingScore ? 'disabled' : ''}
                  class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 flex-shrink-0"
                >
                  <i data-lucide="${state.savingScore ? 'loader-2' : 'send'}" class="w-5 h-5 ${state.savingScore ? 'animate-spin' : ''}"></i>
                  <span>${state.savingScore ? 'Menyimpan...' : 'Simpan & Lihat Peringkat'}</span>
                </button>
              </div>
            </div>

            <!-- Google Sheets Config -->
            <div class="bg-slate-100 rounded-2xl p-5 mb-8 border border-slate-200">
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="settings" class="w-4.5 h-4.5 text-indigo-600"></i>
                <h4 class="font-bold text-slate-700 text-sm">Konfigurasi Google Sheets untuk Instruktur (Opsional)</h4>
              </div>
              <p class="text-xs text-slate-500 mb-3">
                Sebagai penyelenggara/guru KKG, masukkan URL Apps Script Web App Anda di bawah ini agar data pengisian otomatis terkirim langsung sebagai dataset spreadsheet Anda saat peserta menekan tombol Simpan.
              </p>
              <div class="flex flex-col sm:flex-row gap-2">
                <input 
                  type="text"
                  id="sheets-url-input"
                  value="${state.sheetsWebhookUrl}"
                  placeholder="https://script.google.com/macros/s/.../exec"
                  class="flex-1 px-3 py-2 text-xs rounded-xl border border-slate-300 focus:outline-none focus:ring-1 focus:ring-indigo-500 font-mono"
                />
                <button
                  id="btn-save-sheets"
                  class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 text-xs font-bold rounded-xl transition flex items-center gap-1 shrink-0 justify-center"
                >
                  Simpan Webhook URL
                </button>
              </div>
              <div id="sheets-feedback" class="text-xs text-emerald-600 mt-2 font-semibold flex items-center gap-1 ${state.sheetsStatus ? '' : 'hidden'}">
                <i data-lucide="check" class="w-3.5 h-3.5"></i>
                <span id="sheets-feedback-text">${state.sheetsStatus}</span>
              </div>
            </div>

            <!-- Review Hasil -->
            <div class="space-y-6">
              <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2 pb-3 border-b border-slate-100">
                <i data-lucide="help-circle" class="w-5 h-5 text-indigo-500"></i> Hasil Review Skenario AI Co-Teacher
              </h3>
              <div class="space-y-4 max-h-[450px] overflow-y-auto pr-2">
                ${QUESTIONS.map((q, idx) => {
                  const isCorrect = state.selectedAnswers[idx] === q.correctAnswer;
                  return `
                    <div class="p-4 rounded-xl border ${isCorrect ? 'bg-emerald-50/20 border-emerald-100' : 'bg-rose-50/20 border-rose-100'}">
                      <div class="flex items-start gap-3">
                        <i data-lucide="${isCorrect ? 'check-circle-2' : 'x-circle'}" class="w-5 h-5 ${isCorrect ? 'text-emerald-600' : 'text-rose-500'} flex-shrink-0 mt-0.5"></i>
                        <div class="space-y-1.5 flex-1">
                          <h4 class="font-bold text-slate-800 text-sm">Skenario ${idx + 1}: "${q.question}"</h4>
                          <div class="flex flex-wrap gap-2 text-xs">
                            <span class="text-slate-500">
                              Keputusan Anda: <strong class="${isCorrect ? 'text-emerald-700' : 'text-rose-600'}">
                                ${state.selectedAnswers[idx] !== undefined ? q.options[state.selectedAnswers[idx]] : "Belum diisi"}
                              </strong>
                            </span>
                            <span class="text-slate-300">|</span>
                            <span class="text-slate-500">
                              Kunci Skenario: <strong class="text-emerald-700">${q.options[q.correctAnswer]}</strong>
                            </span>
                          </div>
                          <p class="text-xs text-slate-600 bg-white/60 p-3 rounded-lg border border-slate-100 mt-2 leading-relaxed">
                            <strong class="text-indigo-800">Ulasan Etis:</strong> ${q.explanation}
                          </p>
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <!-- Papan Integrasi -->
            <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
              <button
                id="btn-toggle-integrations"
                class="text-slate-500 hover:text-indigo-600 text-xs font-semibold flex items-center gap-1.5 transition"
              >
                <i data-lucide="database" class="w-4 h-4 text-indigo-500"></i> 
                <span>${state.showIntegrations ? "Sembunyikan Panduan Google Sheets" : "Panduan Rekap ke Google Sheets"}</span>
              </button>
              <button
                id="btn-go-leaderboard"
                class="text-indigo-600 hover:text-indigo-800 font-bold text-sm flex items-center gap-1.5"
              >
                <i data-lucide="users" class="w-4 h-4"></i> Langsung ke Papan Peringkat
              </button>
            </div>

            <!-- Panduan Script Area -->
            <div id="integrations-area" class="mt-6 p-5 bg-slate-900 text-slate-300 rounded-2xl border border-slate-800 space-y-4 ${state.showIntegrations ? '' : 'hidden'} animate-fadeIn">
              <div class="flex justify-between items-center">
                <h4 class="font-bold text-white text-sm flex items-center gap-1.5">
                  <i data-lucide="code" class="w-4 h-4 text-emerald-400"></i> Integrasi Dataset Google Apps Script
                </h4>
                <button
                  id="btn-copy-script"
                  class="bg-slate-800 hover:bg-slate-700 text-white text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1 transition"
                >
                  <i data-lucide="${state.copiedText ? 'check' : 'copy'}" class="w-3.5 h-3.5 ${state.copiedText ? 'text-emerald-400' : ''}"></i>
                  <span id="copy-btn-text">${state.copiedText ? 'Terkopil!' : 'Salin Kode Script'}</span>
                </button>
              </div>
              <p class="text-xs text-slate-400 leading-relaxed">
                Dataset hasil pelatihan KKG ini dapat dikirimkan langsung ke Google Sheets Anda secara otomatis. Anda hanya perlu membuat sebuah Google Apps Script dengan metode <code>doPost(e)</code>. Silakan klik tombol di atas untuk menyalin struktur dasarnya.
              </p>
            </div>

          </div>
        `;

        document.getElementById('btn-save-score').addEventListener('click', saveScoreToCloud);

        document.getElementById('btn-save-sheets').addEventListener('click', () => {
          const url = document.getElementById('sheets-url-input').value.trim();
          state.sheetsWebhookUrl = url;
          localStorage.setItem('kkg_sheets_webhook', url);
          state.sheetsStatus = 'URL disimpan ke penyimpanan lokal browser!';
          render();
          setTimeout(() => {
            state.sheetsStatus = '';
            const feedbackEl = document.getElementById('sheets-feedback');
            if (feedbackEl) feedbackEl.classList.add('hidden');
          }, 3000);
        });

        document.getElementById('btn-toggle-integrations').addEventListener('click', () => {
          state.showIntegrations = !state.showIntegrations;
          render();
        });

        document.getElementById('btn-go-leaderboard').addEventListener('click', () => {
          state.screen = 'leaderboard';
          render();
        });

        const copyBtn = document.getElementById('btn-copy-script');
        if (copyBtn) {
          copyBtn.addEventListener('click', () => {
            copyAppsScript();
          });
        }

      } else if (state.screen === 'leaderboard') {
        appEl.innerHTML = `
          <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 transition-all duration-300 animate-fadeIn">
            <div class="text-center mb-8">
              <div class="inline-block bg-amber-50 p-4 rounded-full mb-3">
                <i data-lucide="award" class="w-12 h-12 text-amber-500 animate-bounce"></i>
              </div>
              <h2 class="text-2xl md:text-3xl font-black text-slate-800">Peringkat Kompetensi AI KKG</h2>
              <p class="text-slate-500 text-sm mt-1">Daftar nilai terbaik rekan-rekan pendidik secara real-time</p>
            </div>

            <!-- Tabel Peringkat -->
            <div class="overflow-hidden border border-slate-100 rounded-2xl mb-8">
              <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[500px]">
                  <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 uppercase tracking-wider">
                      <th class="py-4 px-4 text-center w-16">Peringkat</th>
                      <th class="py-4 px-4">Nama Pendidik</th>
                      <th className="py-4 px-4 hidden md:table-cell">Instansi / Kota</th>
                      <th class="py-4 px-4 text-center">Durasi</th>
                      <th class="py-4 px-4 text-center">Skor</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100 text-sm">
                    ${state.leaderboard.length === 0 ? `
                      <tr>
                        <td colspan="5" class="py-8 text-center text-slate-400">
                          Belum ada skor tersimpan. Daftarkan dan kirimkan skor pertama Anda!
                        </td>
                      </tr>
                    ` : state.leaderboard.map((item, index) => {
                      const isCurrentUser = item.id === state.user?.uid;
                      
                      let rankBadge = '';
                      if (index === 0) rankBadge = `<span class="inline-block bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-xs font-bold flex items-center justify-center gap-1 mx-auto w-fit"><i data-lucide="trophy" class="w-3.5 h-3.5"></i> 1</span>`;
                      else if (index === 1) rankBadge = `<span class="inline-block bg-slate-200 text-slate-700 px-2.5 py-1 rounded-full text-xs font-bold flex items-center justify-center gap-1 mx-auto w-fit"><i data-lucide="trophy" class="w-3.5 h-3.5 text-slate-500"></i> 2</span>`;
                      else if (index === 2) rankBadge = `<span class="inline-block bg-amber-600/10 text-amber-800 px-2.5 py-1 rounded-full text-xs font-bold flex items-center justify-center gap-1 mx-auto w-fit"><i data-lucide="trophy" class="w-3.5 h-3.5 text-amber-700"></i> 3</span>`;
                      else rankBadge = `<span class="text-slate-500 font-bold">${index + 1}</span>`;

                      return `
                        <tr class="transition-all ${isCurrentUser ? 'bg-indigo-50/70 border-l-4 border-l-indigo-600 font-medium' : 'hover:bg-slate-50/50'}">
                          <td class="py-4 px-4 text-center font-bold">${rankBadge}</td>
                          <td class="py-4 px-4">
                            <div class="font-semibold text-slate-800">${item.name}</div>
                            <div class="text-xs text-slate-400 md:hidden">${item.school} • ${item.city}</div>
                          </td>
                          <td class="py-4 px-4 hidden md:table-cell text-slate-600">
                            <div>${item.school}</div>
                            <div class="text-xs text-slate-400">${item.city}</div>
                          </td>
                          <td class="py-4 px-4 text-center text-slate-500 text-xs font-mono">
                            ${formatDuration(item.timeTaken || 0)}
                          </td>
                          <td class="py-4 px-4 text-center">
                            <span class="inline-block px-3 py-1 rounded-lg text-sm font-black ${
                              index === 0 
                                ? 'bg-amber-100 text-amber-800' 
                                : isCurrentUser 
                                  ? 'bg-indigo-600 text-white' 
                                  : 'bg-slate-100 text-slate-700'
                            }">
                              ${item.score}
                            </span>
                          </td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Kontrol Navigasi -->
            <div class="flex flex-col sm:flex-row gap-4 justify-between items-center mt-6">
              <div class="text-slate-400 text-xs text-center sm:text-left">
                *Peringkat diurutkan otomatis berdasarkan skor tertinggi, diikuti durasi waktu pengerjaan tercepat.
              </div>
              <div class="flex gap-3 w-full sm:w-auto">
                <button
                  id="btn-back-to-eval"
                  class="flex-1 sm:flex-none border border-slate-200 text-slate-600 hover:bg-slate-50 px-5 py-2.5 rounded-xl font-bold text-sm transition text-center"
                >
                  Kembali ke Evaluasi
                </button>
                <button
                  id="btn-play-again"
                  class="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-1.5"
                >
                  <i data-lucide="refresh-cw" class="w-4 h-4"></i> Main Lagi
                </button>
              </div>
            </div>
          </div>
        `;

        document.getElementById('btn-back-to-eval').addEventListener('click', () => {
          state.screen = 'score';
          render();
        });

        document.getElementById('btn-play-again').addEventListener('click', () => {
          state.quizStartTime = Date.now();
          state.currentIdx = 0;
          state.selectedAnswers = {};
          state.scoreSaved = false;
          state.screen = 'quiz';
          render();
        });
      }

      // Re-initialize Lucide Icons
      lucide.createIcons();
    }

    // === ACTION HELPERS ===
    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return `${mins}m ${secs}d`;
      }
      return `${secs} detik`;
    }

    async function saveScoreToCloud() {
      if (!state.user) {
        alert("Autentikasi belum siap. Hubungkan perangkat Anda ke internet.");
        return;
      }
      state.savingScore = true;
      render();

      const payload = {
        name: state.name.trim(),
        school: state.school.trim(),
        city: state.city.trim(),
        score: state.finalScore,
        timeTaken: state.timeTaken,
        timestamp: Date.now()
      };

      try {
        // 1. Simpan ke Firestore
        const participantId = state.user.uid;
        const scoreDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', participantId);
        await setDoc(scoreDocRef, payload);

        // 2. Kirim ke Google Sheets Webhook jika diisi
        if (state.sheetsWebhookUrl && state.sheetsWebhookUrl.trim().startsWith('http')) {
          try {
            await fetch(state.sheetsWebhookUrl.trim(), {
              method: 'POST',
              mode: 'no-cors',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
          } catch (err) {
            console.error("Koneksi Google Sheets Apps Script gagal, namun data di Firestore aman.", err);
          }
        }

        state.scoreSaved = true;
        state.screen = 'leaderboard';
      } catch (err) {
        console.error("Gagal menyimpan skor:", err);
      } finally {
        state.savingScore = false;
        render();
      }
    }

    function copyAppsScript() {
      const code = `// GOOGLE APPS SCRIPT FOR GOOGLE SHEETS
function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(["Tanggal Pengisian", "Nama Pendidik", "Asal Sekolah", "Kabupaten/Kota", "Skor KKG", "Durasi (Detik)"]);
    }
    
    sheet.appendRow([
      new Date(),
      data.name,
      data.school,
      data.city,
      data.score,
      data.timeTaken
    ]);
    
    return ContentService.createTextOutput(JSON.stringify({"status": "success"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "message": error.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;
      const textarea = document.createElement('textarea');
      textarea.value = code;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        state.copiedText = true;
        render();
        setTimeout(() => {
          state.copiedText = false;
          render();
        }, 2000);
      } catch (err) {
        console.error('Gagal menyalin otomatis', err);
      }
      document.body.removeChild(textarea);
    }

    // === INIT FIREBASE & STATE ===
    const initAuth = async () => {
      try {
        await signInAnonymously(auth);
      } catch (err) {
        console.error("Gagal melakukan inisialisasi autentikasi:", err);
      }
    };

    onAuthStateChanged(auth, (usr) => {
      state.user = usr;
      if (usr) {
        // Subscribe ke leaderboard secara real-time
        const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        onSnapshot(leaderboardRef, (snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          
          list.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            if (a.timeTaken !== b.timeTaken) return a.timeTaken - b.timeTaken;
            return a.timestamp - b.timestamp;
          });

          state.leaderboard = list;
          render();
        }, (error) => {
          console.error("Gagal memuat papan skor real-time:", error);
        });
      }
      render();
    });

    // Jalankan inisialisasi
    initAuth();
  </script>
</body>
</html>
